<!DOCTYPE html>
<html>
<head>
    <title>HabitPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4 text-primary">✨ HabitPulse Tracker</h2>

    <!-- DASHBOARD -->
    <div class="row text-center mb-4">
        <div class="col">
            <div class="card p-3 bg-primary text-white">
                <h5>Total</h5>
                <h3 id="totalCount">0</h3>
            </div>
        </div>
        <div class="col">
            <div class="card p-3 bg-success text-white">
                <h5>Completed</h5>
                <h3 id="completedCount">0</h3>
            </div>
        </div>
        <div class="col">
            <div class="card p-3 bg-warning text-dark">
                <h5>Pending</h5>
                <h3 id="pendingCount">0</h3>
            </div>
        </div>
    </div>

    <!-- ADD HABIT -->
    <div class="card p-3 mb-3">
        <input type="text" id="habitInput" class="form-control mb-2" placeholder="Enter habit">
        <button id="addBtn" class="btn btn-primary">Add Habit</button>
    </div>

    <!-- MESSAGE -->
    <div id="messageBox" class="text-center mb-3"></div>

    <!-- FILTERS -->
    <div class="mb-3 text-center">
        <button class="btn btn-secondary filterBtn active" data-filter="all">All</button>
        <button class="btn btn-success filterBtn" data-filter="completed">Completed</button>
        <button class="btn btn-warning filterBtn" data-filter="pending">Pending</button>
    </div>

    <!-- HABIT LIST -->
    <div id="habitList" class="list-group"></div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>

let currentFilter = "all";

// DASHBOARD
function loadDashboard() {
    $.get("/api/dashboard/", function(data) {
        $("#totalCount").text(data.total);
        $("#completedCount").text(data.completed);
        $("#pendingCount").text(data.pending);
    });
}

// LOAD HABITS
function loadHabits() {
    $.get("/api/habits/", function(data) {
        $("#habitList").empty();

        let visibleCount = 0;

        data.forEach(habit => {

            if (currentFilter === "completed" && !habit.completed) return;
            if (currentFilter === "pending" && habit.completed) return;

            visibleCount++;

            let checked = habit.completed ? "checked" : "";

            $("#habitList").append(`
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input type="checkbox" class="completeCheckbox" data-id="${habit.id}" ${checked}>
                        <span class="${habit.completed ? 'text-decoration-line-through' : ''}">
                            ${habit.name}
                        </span>
                        <small class="text-muted ms-2">${habit.created_at}</small>
                    </div>
                    <button class="btn btn-danger btn-sm deleteBtn" data-id="${habit.id}">Delete</button>
                </div>
            `);
        });

        if (visibleCount === 0) {
            $("#habitList").html('<div class="text-center text-muted">No habits found</div>');
        }
    });
}

$(document).ready(function() {

    loadHabits();
    loadDashboard();

    // ADD HABIT
    $("#addBtn").click(function() {
        let habitName = $("#habitInput").val().trim();

        if(habitName === "") {
            $("#messageBox").html('<div class="alert alert-warning">Enter a habit!</div>');
            return;
        }

        $.ajax({
            url: "/add/",
            type: "POST",
            data: JSON.stringify({ name: habitName }),
            contentType: "application/json",
            success: function(response) {
                if(response.status === "success") {
                    $("#habitInput").val("");
                    $("#messageBox").html('<div class="alert alert-success">Habit added!</div>');
                    loadHabits();
                    loadDashboard();
                }
            }
        });
    });

    // FILTER
    $(".filterBtn").click(function() {
        currentFilter = $(this).data("filter");
        $(".filterBtn").removeClass("active");
        $(this).addClass("active");
        loadHabits();
    });

    // COMPLETE
    $(document).on("change", ".completeCheckbox", function() {
        let id = $(this).data("id");
        let completed = $(this).is(":checked");

        $.ajax({
            url: `/api/habits/${id}/`,
            type: "PUT",
            data: JSON.stringify({ completed: completed }),
            contentType: "application/json",
            success: function() {
                loadHabits();
                loadDashboard();
            }
        });
    });

    // DELETE
    $(document).on("click", ".deleteBtn", function() {
        let id = $(this).data("id");

        $.ajax({
            url: `/api/habits/${id}/`,
            type: "DELETE",
            success: function() {
                $("#messageBox").html('<div class="alert alert-danger">Habit deleted!</div>');
                loadHabits();
                loadDashboard();
            }
        });
    });

});
</script>

</body>
</html>
