<!DOCTYPE html>
<html>
<head>
    <title>HabitPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <div class="container mt-5">


<div class="d-flex justify-content-end mb-3">

    <!-- LOGIN BUTTON -->
    <a href="/login/" class="btn btn-outline-primary me-2">Login</a>

    <!-- LOGOUT BUTTON (FIXED) -->
    <form action="/logout/" method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-danger">Logout</button>
    </form>

</div>




    <!-- DASHBOARD CARDS -->
    <div class="row text-center mb-4">
        <div class="col">
            <div class="card p-3 bg-primary text-white">
                <h5>Total</h5>
                <h3 id="totalCount">0</h3>
            </div>
        </div>
        <div class="col">
            <div class="card p-3 bg-success text-white">
                <h5>Completed</h5>
                <h3 id="completedCount">0</h3>
            </div>
        </div>
        <div class="col">
            <div class="card p-3 bg-warning text-dark">
                <h5>Pending</h5>
                <h3 id="pendingCount">0</h3>
            </div>
        </div>
    </div>

    <!-- ADD HABIT -->
    <div class="card p-3 mb-3">
        <input type="text" id="habitInput" class="form-control mb-2" placeholder="Enter habit">
        <button id="addBtn" class="btn btn-primary">Add Habit</button>
    </div>

    <!-- MESSAGE BOX -->
    <div id="messageBox" class="text-center mb-3"></div>

    <!-- FILTER BUTTONS -->
    <div class="mb-3 text-center">
        <button class="btn btn-secondary filterBtn active" data-filter="all">All</button>
        <button class="btn btn-success filterBtn" data-filter="completed">Completed</button>
        <button class="btn btn-warning filterBtn" data-filter="pending">Pending</button>
    </div>

    <!-- HABIT LIST -->
    <div id="habitList" class="list-group mb-4"></div>

    <!-- PIE CHART -->
    <div class="card p-3 mb-4">
        <h5 class="text-center mb-3">Habit Completion Statistics</h5>
        <canvas id="habitChart" width="400" height="400"></canvas>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>DESCRIBE tracker_habit;
<script>

let currentFilter = "all";

// DASHBOARD COUNTS
function loadDashboard() {
    $.get("/api/dashboard/", function(data) {
        $("#totalCount").text(data.total);
        $("#completedCount").text(data.completed);
        $("#pendingCount").text(data.pending);
    });
}

// HABIT LIST
function loadHabits() {
    $.get("/api/habits/", function(data) {
        $("#habitList").empty();
        let visibleCount = 0;

        data.forEach(habit => {
            if (currentFilter === "completed" && !habit.completed) return;
            if (currentFilter === "pending" && habit.completed) return;

            visibleCount++;
            let checked = habit.completed ? "checked" : "";

            $("#habitList").append(`
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input type="checkbox" class="completeCheckbox" data-id="${habit.id}" ${checked}>
                        <span class="${habit.completed ? 'text-decoration-line-through' : ''}">
                            ${habit.name}
                        </span>
                        <small class="text-muted ms-2">${habit.created_at}</small>
                    </div>
                    <button class="btn btn-danger btn-sm deleteBtn" data-id="${habit.id}">Delete</button>
                </div>
            `);
        });

        if (visibleCount === 0) {
            $("#habitList").html('<div class="text-center text-muted">No habits found</div>');
        }
    });
}

// PIE CHART
function loadChart() {
    $.get("/api/dashboard/", function(data) {
        const ctx = document.getElementById('habitChart').getContext('2d');

        // Destroy previous chart instance if exists
        if(window.habitChartInstance) window.habitChartInstance.destroy();

        const pending = data.total - data.completed;

        window.habitChartInstance = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Completed', 'Pending'],
                datasets: [{
                    data: [data.completed, pending],
                    backgroundColor: ['#4caf50', '#f44336']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' },
                    title: { display: true, text: `Total Habits: ${data.total}` }
                }
            }
        });
    });
}

$(document).ready(function() {

    loadHabits();
    loadDashboard();
    loadChart();

    // ADD HABIT
    $("#addBtn").click(function() {
        let habitName = $("#habitInput").val().trim();
        if(habitName === "") {
            $("#messageBox").html('<div class="alert alert-warning">Enter a habit!</div>');
            return;
        }
        $.ajax({
            url: "/add/",
            type: "POST",
            data: JSON.stringify({ name: habitName }),
            contentType: "application/json",
            success: function(response) {
                if(response.status === "success") {
                    $("#habitInput").val("");
                    $("#messageBox").html('<div class="alert alert-success">Habit added!</div>');
                    loadHabits();
                    loadDashboard();
                    loadChart();
                }
            }
        });
    });

    // FILTER BUTTONS
    $(".filterBtn").click(function() {
        currentFilter = $(this).data("filter");
        $(".filterBtn").removeClass("active");
        $(this).addClass("active");
        loadHabits();
    });

    // COMPLETE HABIT
    $(document).on("change", ".completeCheckbox", function() {
        let id = $(this).data("id");
        let completed = $(this).is(":checked");

        $.ajax({
            url: `/api/habits/${id}/`,
            type: "PUT",
            data: JSON.stringify({ completed: completed }),
            contentType: "application/json",
            success: function() {
                loadHabits();
                loadDashboard();
                loadChart();
            }
        });
    });

    // DELETE HABIT
    $(document).on("click", ".deleteBtn", function() {
        let id = $(this).data("id");

        $.ajax({
            url: `/api/habits/${id}/`,
            type: "DELETE",
            success: function() {
                $("#messageBox").html('<div class="alert alert-danger">Habit deleted!</div>');
                loadHabits();
                loadDashboard();
                loadChart();
            }
        });
    });

});
</script>

</body>
</html>
